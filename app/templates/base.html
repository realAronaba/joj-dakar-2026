<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JOJ Dakar 2026{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ url_for('main.index') }}" class="header-brand">
                <span class="header-logo">&#127941;</span>
                <span class="header-title">Dakar 2026</span>
            </a>

            <!-- Hamburger -->
            <button class="nav-burger" id="navBurger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>

            <nav class="site-nav" id="siteNav">
                <a href="{{ url_for('main.index') }}"
                   class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                    Accueil
                </a>
                <a href="{{ url_for('main.sites') }}"
                   class="nav-link {% if request.endpoint == 'main.sites' %}active{% endif %}">
                    Sites
                </a>
                <a href="{{ url_for('main.programme') }}"
                   class="nav-link {% if request.endpoint == 'main.programme' %}active{% endif %}">
                    Programme
                </a>
                <a href="{{ url_for('main.carte') }}"
                   class="nav-link {% if request.endpoint == 'main.carte' %}active{% endif %}">
                    Carte
                </a>
                <a href="{{ url_for('main.agenda') }}"
                   class="nav-link nav-agenda {% if request.endpoint == 'main.agenda' %}active{% endif %}">
                    Mon agenda
                    {% set nb = session.get('agenda', [])|length %}
                    <span id="agenda-count"
                          style="display:{{ 'inline' if nb > 0 else 'none' }}">{{ nb }}</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            &copy; 2026 &mdash; L'Afrique accueille, Dakar célèbre
        </div>
    </footer>

    <script>
    const burger = document.getElementById('navBurger');
    const nav    = document.getElementById('siteNav');
    burger.addEventListener('click', () => {
        nav.classList.toggle('open');
        burger.classList.toggle('open');
    });
    // Fermer le menu au clic sur un lien
    nav.querySelectorAll('.nav-link').forEach(l =>
        l.addEventListener('click', () => {
            nav.classList.remove('open');
            burger.classList.remove('open');
        })
    );
    </script>
</body>
</html>
