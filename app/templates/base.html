<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JOJ Dakar 2026{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="{{ url_for('main.index') }}" class="header-brand">
                <span class="header-logo">&#127941;</span>
                <span class="header-title">Dakar 2026</span>
            </a>

            <!-- Hamburger -->
            <button class="nav-burger" id="navBurger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>

            <nav class="site-nav" id="siteNav">
                <a href="{{ url_for('main.index') }}"
                   class="nav-link {% if request.endpoint == 'main.index' %}active{% endif %}">
                    Accueil
                </a>
                <a href="{{ url_for('main.sites') }}"
                   class="nav-link {% if request.endpoint == 'main.sites' %}active{% endif %}">
                    Sites
                </a>
                <a href="{{ url_for('main.programme') }}"
                   class="nav-link {% if request.endpoint == 'main.programme' %}active{% endif %}">
                    Programme
                </a>
                <a href="{{ url_for('main.carte') }}"
                   class="nav-link {% if request.endpoint == 'main.carte' %}active{% endif %}">
                    Carte
                </a>
                <a href="{{ url_for('main.agenda') }}"
                   class="nav-link nav-agenda {% if request.endpoint == 'main.agenda' %}active{% endif %}">
                    Mon agenda
                    {% set nb = session.get('agenda', [])|length %}
                    <span id="agenda-count"
                          style="display:{{ 'inline' if nb > 0 else 'none' }}">{{ nb }}</span>
                </a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            &copy; 2026 &mdash; L'Afrique accueille, Dakar célèbre
        </div>
    </footer>

    <script>
    // ── Menu burger ────────────────────────────────
    const burger = document.getElementById('navBurger');
    const nav    = document.getElementById('siteNav');
    burger.addEventListener('click', () => {
        nav.classList.toggle('open');
        burger.classList.toggle('open');
    });
    nav.querySelectorAll('.nav-link').forEach(l =>
        l.addEventListener('click', () => {
            nav.classList.remove('open');
            burger.classList.remove('open');
        })
    );

    // ── Web Push Notifications ─────────────────────
    const notifBtn = document.getElementById('notifBtn');
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        if (notifBtn) notifBtn.style.display = 'none';
    }

    async function getVapidKey() {
        const r = await fetch('/api/push/vapid-public-key');
        const d = await r.json();
        return d.key;
    }

    function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - base64String.length % 4) % 4);
        const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw     = atob(base64);
        return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    async function activerNotifications() {
        try {
            const reg  = await navigator.serviceWorker.register('/static/sw.js');
            const perm = await Notification.requestPermission();
            if (perm !== 'granted') {
                alert('Les notifications ont été refusées.');
                return;
            }
            const vapidKey = await getVapidKey();
            if (!vapidKey) { alert('Notifications non configurées.'); return; }

            const sub = await reg.pushManager.subscribe({
                userVisibleOnly:      true,
                applicationServerKey: urlBase64ToUint8Array(vapidKey),
            });
            await fetch('/api/push/subscribe', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ subscription: sub }),
            });
            notifBtn.textContent = '🔔 Activées';
            notifBtn.classList.add('notif-on');
        } catch(e) {
            console.error('Erreur notifications:', e);
            alert('Impossible d\'activer les notifications.');
        }
    }

    async function desactiverNotifications() {
        const reg = await navigator.serviceWorker.ready;
        const sub = await reg.pushManager.getSubscription();
        if (sub) await sub.unsubscribe();
        await fetch('/api/push/unsubscribe', { method: 'POST' });
        notifBtn.textContent = '🔕 Notif';
        notifBtn.classList.remove('notif-on');
    }

    if (notifBtn) {
        // Vérifie l'état actuel
        navigator.serviceWorker.register('/static/sw.js').then(async reg => {
            const sub = await reg.pushManager.getSubscription();
            if (sub) {
                notifBtn.textContent = '🔔 Activées';
                notifBtn.classList.add('notif-on');
            }
        });

        notifBtn.addEventListener('click', async () => {
            const reg = await navigator.serviceWorker.ready;
            const sub = await reg.pushManager.getSubscription();
            if (sub) await desactiverNotifications();
            else     await activerNotifications();
        });
    }
    </script>
</body>
</html>
